services:
  backend_api:
    build: ./backend
    env_file: .env
    environment:
      APP_ROLE: api
      ENABLE_SCHEDULER: "0"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend_scheduler:
    build: ./backend
    env_file: .env
    environment:
      APP_ROLE: scheduler
      ENABLE_SCHEDULER: "1"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend_api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
